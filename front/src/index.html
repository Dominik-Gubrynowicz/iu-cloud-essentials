<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Essentials - Sample Application</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #f8fafc;
            --text-color: #334155;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f1f5f9;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .status-card {
            background-color: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .status-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .badge.success {
            background-color: #dcfce7;
            color: #166534;
        }

        .badge.error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .badge.loading {
            background-color: #fef3c7;
            color: #92400e;
        }

        pre {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.875rem;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
            width: 100%;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AWS Essentials</h1>
        <p>This static page is hosted on <strong>Amazon S3</strong> and delivered via <strong>CloudFront</strong>.</p>

        <div class="status-card">
            <div class="status-header">
                <span>Backend API Connection</span>
                <span id="status-badge" class="badge loading">Ready</span>
            </div>
            <p>Click the button below to test routing to the ECS backend through the Application Load Balancer via the
                <code>/api</code> path.
            </p>

            <button id="test-btn" onclick="testBackend()">Test API Connection</button>

            <div id="result-container" style="display: none; margin-top: 1rem;">
                <strong>Response Details:</strong>
                <pre id="response-data"></pre>
            </div>
        </div>
    </div>

    <script>
        async function testBackend() {
            const btn = document.getElementById('test-btn');
            const statusBadge = document.getElementById('status-badge');
            const resultContainer = document.getElementById('result-container');
            const responseDataStr = document.getElementById('response-data');

            btn.disabled = true;
            btn.textContent = 'Testing...';
            statusBadge.className = 'badge loading';
            statusBadge.textContent = 'Loading...';
            resultContainer.style.display = 'none';

            try {
                // The /api path matches the ordered_cache_behavior in CloudFront
                // which forwards requests to the ALB Origin -> ECS Tasks
                const startTime = performance.now();

                // We test a hypothetical /api/health endpoint
                const response = await fetch('/api/health', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const endTime = performance.now();
                const duration = Math.round(endTime - startTime);

                let dataText;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    const dataObj = await response.json();
                    dataText = JSON.stringify(dataObj);
                } else {
                    dataText = await response.text();
                }

                if (response.ok) {
                    statusBadge.className = 'badge success';
                    statusBadge.textContent = 'Success';
                } else {
                    statusBadge.className = 'badge error';
                    statusBadge.textContent = `Error: ${response.status}`;
                }

                // If this is an nginx default page or similar, the body may just be HTML
                responseDataStr.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    duration: `${duration}ms`,
                    body: dataText.substring(0, 500) + (dataText.length > 500 ? '...' : '')
                }, null, 2);

            } catch (error) {
                statusBadge.className = 'badge error';
                statusBadge.textContent = 'Failed to connect';
                responseDataStr.textContent = `Error connecting to API: ${error.message}\n\nMake sure the ECS service is running and attached to the ALB target group resolving the /api path.`;
            } finally {
                resultContainer.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Test API Connection Again';
            }
        }
    </script>
</body>

</html>
